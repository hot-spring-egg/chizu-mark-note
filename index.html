<!DOCTYPE html>
<html lang="ja">
<head>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            terracotta: '#E07A5F',
            sage: '#81B29A',
            bluegrey: '#3D405B',
            cream: '#F4F1DE',
            mustard: '#F2CC8F',
          },
          fontFamily: {
            rounded: ['"M PLUS Rounded 1c"', 'sans-serif'],

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
      height: 100dvh;
      width: 100vw;
      font-family: 'M PLUS Rounded 1c', sans-serif;
    }
    
    #root {
      height: 100%;
      width: 100%;
    }

    /* コルクボード風背景 */
    .bg-cork {
      background-color: #d0a57b;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
    }

    /* 紙の質感背景 */
    .bg-paper {
      background-color: #F4F1DE;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
    }

    /* 画鋲（ピン）装飾 */
    .pin {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fca5a5, #E07A5F);
      box-shadow: 2px 3px 4px rgba(0,0,0,0.3), inset -1px -1px 3px rgba(0,0,0,0.2);
      z-index: 10;
    }
    .pin::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background-color: rgba(255,255,255,0.6);
    }
    .pin-blue { background: radial-gradient(circle at 30% 30%, #93c5fd, #3D405B); }
    .pin-yellow { background: radial-gradient(circle at 30% 30%, #fde047, #F2CC8F); }
    .pin-green { background: radial-gradient(circle at 30% 30%, #a7f3d0, #81B29A); }

    @keyframes openNote {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .animate-open-note { animation: openNote 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }

    @keyframes popIn {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  </style>
</head>

    // --- カテゴリ選択用ノートコンポーネント ---
    const CategoryNote = ({ category, onClick, isSelected, pinColorClass }) => {
      return (
        <div 
          onClick={onClick}
          className={`bg-white w-full h-24 sm:h-28 rounded-sm flex flex-col items-center justify-center relative cursor-pointer transition-all p-3 
            ${isSelected 
              ? 'border-4 border-terracotta transform -translate-y-1 shadow-lg ring-2 ring-terracotta/30' 
              : 'border border-gray-100 shadow-md hover:-translate-y-1 hover:shadow-lg'}`}
        >
          {isSelected && (
            <div className="absolute -top-3 -right-3 w-7 h-7 sm:w-8 sm:h-8 bg-terracotta text-white rounded-full flex items-center justify-center font-bold text-lg sm:text-xl shadow-md border-2 border-white z-20">
              ✓
            </div>
          )}
          <div className={`pin ${pinColorClass}`}></div>
          <span className="font-rounded text-bluegrey font-bold text-center text-sm sm:text-base mt-2">
            {category}
          </span>
        </div>
      );
    };

    // --- メインアプリケーション ---
    const App = () => {
      const [gameState, setGameState] = useState('TITLE'); // 'TITLE', 'SELECT', 'QUIZ', 'RESULT'
      const [selectedCategories, setSelectedCategories] = useState([]);
      const [questions, setQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [feedback, setFeedback] = useState(null);
      const [options, setOptions] = useState([]);
      const [hasMistaked, setHasMistaked] = useState(false);

      // ポータルサイトへスコアを加算保存
      const addScoreToLocal = () => {
        try {
          const currentScore = parseInt(localStorage.getItem('gogo_drill_score') || '0', 10);
          localStorage.setItem('gogo_drill_score', currentScore + 1);
        } catch(e) {
          console.warn("localStorage not available");
        }
      };

      const toggleCategory = (category) => {
        setSelectedCategories(prev => 
          prev.includes(category) 
            ? prev.filter(c => c !== category) 
            : [...prev, category]
        );
      };

      const startGame = () => {
        if (selectedCategories.length === 0) {
          alert('しゅるいを 1つ以上 えらんでね！');
          return;
        }
        
        let targetSymbols = SYMBOL_DATA.filter(s => selectedCategories.includes(s.category));
        targetSymbols = targetSymbols.sort(() => 0.5 - Math.random());
        
        setQuestions(targetSymbols);
        setCurrentIndex(0);
        setScore(0);
        setHasMistaked(false);
        setFeedback(null);
        setGameState('QUIZ');
      };

      useEffect(() => {
        if (gameState === 'QUIZ' && questions.length > 0) {
          const currentSymbol = questions[currentIndex];
          
          const sameCategory = SYMBOL_DATA.filter(s => s.category === currentSymbol.category && s.id !== currentSymbol.id);
          const others = SYMBOL_DATA.filter(s => s.category !== currentSymbol.category);
          
          let newOptions = sameCategory.sort(() => 0.5 - Math.random()).slice(0, 3);
          
          if (newOptions.length < 3) {
            const extra = others.sort(() => 0.5 - Math.random()).slice(0, 3 - newOptions.length);
            newOptions = [...newOptions, ...extra];
          }
          
          newOptions.push(currentSymbol);
          setOptions(newOptions.sort(() => 0.5 - Math.random()));
        }
      }, [gameState, currentIndex, questions]);

      const handleAnswer = (opt) => {
        if (feedback !== null) return; 

        const isCorrect = opt.id === questions[currentIndex].id;

        if (isCorrect) {
          setFeedback('⭕️');
          if (!hasMistaked) {
            setScore(s => s + 1);
            addScoreToLocal();
          }
          
          setTimeout(() => {
            if (currentIndex + 1 < questions.length) {
              setCurrentIndex(i => i + 1);
              setHasMistaked(false);
              setFeedback(null);
            } else {
              setGameState('RESULT');
              setFeedback(null);
            }
          }, 1200);
        } else {
          setFeedback('❌');
          setHasMistaked(true);
          
          setTimeout(() => {
            setFeedback(null);
          }, 1200);
        }
      };

      const backToPortal = () => {
        window.location.href = 'https://hot-spring-egg.github.io/ontama-drill/';
      };

      return (
        <div className="w-full h-full flex flex-col items-center justify-center relative overflow-hidden bg-cork">
          
          {(gameState === 'TITLE' || gameState === 'SELECT') && (
            <button 
              onClick={backToPortal}
              className="absolute top-4 left-4 sm:top-6 sm:left-6 bg-white/90 text-bluegrey px-4 py-2 rounded-full font-bold shadow-sm hover:shadow-md transition-all z-40 border border-gray-200 text-sm sm:text-base"
            >
              ← ドリルにもどる
            </button>
          )}

          {gameState === 'TITLE' && (
            <div className="w-full max-w-md mx-auto flex flex-col items-center justify-center p-4">
              <div className="bg-paper px-8 py-8 rounded-sm shadow-md mb-12 transform -rotate-2 relative border border-white">
                <div className="pin pin-yellow"></div>
                <h1 className="font-rounded text-4xl sm:text-5xl font-bold text-bluegrey tracking-widest text-center mt-2 leading-tight">
                  チズキゴウ<br/>ノート
                </h1>
                <p className="text-center text-sage font-bold mt-4 text-sm sm:text-base bg-white/80 py-1 px-4 rounded-full">
                  よめるかな？ 地図記号クイズ
                </p>
              </div>
              
              <button 
                onClick={() => setGameState('SELECT')}
                className="w-full bg-terracotta text-white font-rounded py-4 rounded-full shadow-lg active:translate-y-1 active:shadow-md text-2xl font-bold transition-all border-4 border-white"
              >
                はじめる
              </button>
            </div>
          )}

          {gameState === 'SELECT' && (
            <div className="w-full h-full flex flex-col items-center relative py-6">
              <div className="w-full max-w-4xl mx-auto flex flex-col items-center mb-4 bg-paper/90 p-4 rounded-lg shadow-sm border border-white mt-12 sm:mt-0">
                <h2 className="font-rounded text-xl sm:text-2xl font-bold text-bluegrey">
                  どの しゅるい に チャレンジする？
                </h2>
                <p className="text-sm text-gray-500 mt-1">（いくつでも えらべるよ）</p>
              </div>

              <div className="w-full max-w-3xl flex justify-end gap-4 px-4 mb-2">
                <button onClick={() => setSelectedCategories([...CATEGORIES])} className="font-rounded text-sm font-bold text-sage underline">全部えらぶ</button>
                <button onClick={() => setSelectedCategories([])} className="font-rounded text-sm font-bold text-terracotta underline">全部けす</button>
              </div>

              <div className="w-full flex-1 overflow-y-auto px-4 pb-32">
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 w-full max-w-3xl mx-auto">
                  {CATEGORIES.map((category, index) => (
                    <CategoryNote 
                      key={category} 
                      category={category} 
                      isSelected={selectedCategories.includes(category)}
                      onClick={() => toggleCategory(category)}
                      pinColorClass={['pin-blue', 'pin-green', 'pin-yellow'][index % 3]}
                    />
                  ))}
                </div>
              </div>

              {selectedCategories.length > 0 && (
                <div className="absolute bottom-6 w-full flex justify-center animate-open-note z-10 px-4 pointer-events-none">
                  <button 
                    onClick={startGame}
                    className="bg-sage text-white font-rounded py-3 sm:py-4 px-10 rounded-full shadow-lg active:translate-y-1 active:shadow-md text-xl font-bold transition-all border-4 border-white w-full max-w-sm pointer-events-auto"
                  >
                    クイズを スタート！
                  </button>
                </div>
              )}
            </div>
          )}

          {gameState === 'QUIZ' && questions.length > 0 && (
            <div className="w-full h-full flex flex-col p-2 sm:p-4 relative">
              <div className="w-full max-w-3xl mx-auto flex-1 flex flex-col items-center bg-paper rounded-sm shadow-xl p-3 sm:p-6 overflow-hidden relative animate-open-note border border-white">
                
                <div className="w-full flex justify-between items-center font-rounded text-sm sm:text-base text-bluegrey/70 mb-2 sm:mb-4 px-2">
                  <button 
                    onClick={() => setGameState('SELECT')} 
                    className="underline hover:text-bluegrey bg-white/50 px-3 py-1 rounded-full"
                    disabled={feedback !== null}
                  >
                    ← やめる
                  </button>
                  <div className="flex gap-3 font-bold">
                    <span className="bg-white px-3 py-1 rounded-full shadow-sm border border-gray-100">
                      {currentIndex + 1} / {questions.length} 問
                    </span>
                    <span className="bg-white px-3 py-1 rounded-full shadow-sm text-terracotta border border-gray-100">
                      スコア: {score}
                    </span>
                  </div>
                </div>

                {/* 【修正】地図記号の枠を小さくし、画面下部の見切れを防ぎました */}
                <div className="w-full aspect-square max-h-[30vh] sm:max-h-[40vh] bg-white rounded-xl border-4 border-sage shadow-inner flex flex-col items-center justify-center p-4 sm:p-8 relative shrink-0">
                   <div className="absolute top-3 left-3 w-4 h-4 rounded-full bg-gray-200 shadow-inner"></div>
                   <div className="absolute top-3 right-3 w-4 h-4 rounded-full bg-gray-200 shadow-inner"></div>
                   <div className="absolute bottom-3 left-3 w-4 h-4 rounded-full bg-gray-200 shadow-inner"></div>
                   <div className="absolute bottom-3 right-3 w-4 h-4 rounded-full bg-gray-200 shadow-inner"></div>
                   
                   <div className="w-3/4 h-3/4 max-w-[160px] max-h-[160px]">
                      {questions[currentIndex].svg}
                   </div>
                </div>

                <div className="text-center my-3 sm:my-4 shrink-0 z-10">
                  <p className="text-base sm:text-xl font-bold text-bluegrey bg-white/80 backdrop-blur-sm px-6 py-2 rounded-full shadow-sm border border-gray-100">
                    この 地図記号は なあに？
                  </p>
                </div>

                <div className="grid grid-cols-2 gap-3 w-full max-w-md mt-auto pb-4 px-2 z-10">
                  {options.map(opt => (
                    <button 
                      key={opt.id}
                      onClick={() => handleAnswer(opt)}
                      disabled={feedback !== null}
                      className="bg-white border-b-4 border-mustard text-bluegrey font-rounded py-3 sm:py-4 rounded-lg shadow-md hover:bg-mustard/10 active:translate-y-1 active:border-b-0 transition-all font-bold flex flex-col items-center justify-center"
                    >
                      <span className="text-[10px] sm:text-xs text-gray-500 font-normal mb-0.5">{opt.kana}</span>
                      <span className="text-base sm:text-2xl leading-tight">{opt.name}</span>
                    </button>
                  ))}
                </div>

                {feedback && (
                  <div className="absolute inset-0 flex items-center justify-center z-50 pointer-events-none bg-white/40 backdrop-blur-sm">
                    <span className={`text-[12rem] drop-shadow-2xl font-bold ${feedback === '⭕️' ? 'text-sage' : 'text-terracotta'} animate-pop-in`}>
                      {feedback}
                    </span>
                  </div>
                )}
              </div>
            </div>
          )}

          {gameState === 'RESULT' && (
            <div className="w-full h-full flex flex-col p-4 sm:p-8 relative">
              <div className="w-full max-w-xl mx-auto flex-1 flex flex-col items-center justify-center bg-paper rounded-sm shadow-xl p-6 relative animate-open-note border border-white">
                <div className="pin pin-blue"></div>
                
                <h2 className="font-rounded text-3xl sm:text-4xl font-bold mb-6 text-bluegrey border-b-2 border-sage pb-2 mt-4">
                  けっか はっぴょう
                </h2>
                
                <p className="text-[6rem] sm:text-[8rem] font-bold text-terracotta mb-4 leading-none drop-shadow-sm">
                  {score} <span className="text-2xl sm:text-4xl text-bluegrey">てん</span>
                </p>
                
                <p className="font-rounded text-lg sm:text-xl mb-12 text-sage font-bold bg-white px-6 py-2 rounded-full shadow-sm">
                  {score === questions.length ? 'パーフェクト！ すごいぞ！' : 'よく がんばったね！'}
                </p>
                
                <div className="flex flex-col sm:flex-row gap-4 w-full">
                  <button 
                    onClick={() => setGameState('SELECT')}
                    className="flex-1 bg-sage text-white font-rounded py-4 rounded-full shadow-md active:translate-y-1 active:shadow-sm text-xl font-bold transition-all border-2 border-white"
                  >
                    しゅるいを えらぶ
                  </button>
                  <button 
                    onClick={backToPortal}
                    className="flex-1 bg-bluegrey text-white font-rounded py-4 rounded-full shadow-md active:translate-y-1 active:shadow-sm text-xl font-bold transition-all border-2 border-white"
                  >
                    ドリルに もどる
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
